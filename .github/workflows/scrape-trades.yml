name: Scrape Congressional Trades

on:
  schedule:
    # Run daily at 6 AM UTC (after markets open in DC)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pdfplumber lxml

      - name: Scrape trades
        run: python scripts/scrape_trades.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/all_trades.json
          git diff --staged --quiet || git commit -m "chore: update congressional trade data [skip ci]"
          git push
